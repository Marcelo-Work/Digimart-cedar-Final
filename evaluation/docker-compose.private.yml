

version: '3.8'

services:
  # Backend with private seed data
  backend-private:
    build:
      context: ..
      dockerfile: base-app/Dockerfile.backend
    container_name: digimart-backend-private
    ports:
      - "3001:3000"  
      - ../base-app/src/backend:/app
      - private-db:/app/db
    environment:
      - DEBUG=True
      - SECRET_KEY=private-test-secret-key
      - DATABASE_URL=sqlite:///db/private.sqlite3
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend-private,frontend-private
      - CORS_ALLOWED_ORIGINS=http://localhost:5174,http://frontend-private:80
    command: >
      sh -c "pip install -q -r requirements.txt &&
             python manage.py migrate --noinput &&
             python evaluation/scripts/seed_private.py &&
             python manage.py runserver 0.0.0.0:3000"
    networks:
      - digimart-private-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Longer for seed script

  # Frontend for private tests
  frontend-private:
    build:
      context: ..
      dockerfile: base-app/Dockerfile.frontend.dev
    container_name: digimart-frontend-private
    ports:
      - "5174:5173"  # Different port
    volumes:
      - ../base-app/src/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:3001/api
      - VITE_APP_ENV=private-test
    command: npm run dev -- --host 0.0.0.0 --port 5173
    networks:
      - digimart-private-net
    depends_on:
      backend-private:
        condition: service_healthy

  # Playwright runner for private tests
  playwright-private:
    build:
      context: ..
      dockerfile: base-app/Dockerfile.playwright
    container_name: digimart-playwright-private
    volumes:
      - ..:/app
      - ./test-results-private:/app/test-results
    environment:
      - PLAYWRIGHT_BROWSERS_PATH=0
      - VITE_API_BASE_URL=http://backend-private:3000/api
    command: >
      sh -c "sleep 10 &&  # Wait for services to be ready
             npx playwright test evaluation/private-test-cases/ --reporter=list"
    networks:
      - digimart-private-net
    depends_on:
      backend-private:
        condition: service_healthy
      frontend-private:
        condition: service_healthy
    profiles:
      - test

networks:
  digimart-private-net:
    driver: bridge

volumes:
  private-db:  
  node_modules-private: