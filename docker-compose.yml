# version: '3.8'

services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    volumes:
      - ./src/backend:/app
      - ./data:/app/data
    ports:
      - "3000:3000"
    environment:
      - DEBUG=1
      - DB_ENGINE=sqlite3
      - DB_NAME=/app/data/db.sqlite3
      - SEED_SCRIPT=scripts/seed_public.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["sh", "entrypoint.sh"]

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./deployment/nginx/default.conf.template:/etc/nginx/conf.d/default.conf.template
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
volumes:
  sqlite_data:

networks:
  default:
    driver: bridge